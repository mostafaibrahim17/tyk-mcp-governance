<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" width="920" height="470" font-family="system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="920" height="470" rx="14" fill="#f7f9fc" stroke="#e2e8f0"/>
  <text x="32" y="42" fill="#0f172a" font-size="19" font-weight="700">Architecture at a glance</text>
  <text x="32" y="66" fill="#64748b" font-size="14">One open-source gateway in front of the MCP server and OpenAI</text>

  <!-- agents -->
  <rect x="30" y="120" width="150" height="48" rx="10" fill="#ecfdf5" stroke="#34d399"/>
  <circle cx="54" cy="144" r="8" fill="#10b981"/><text x="72" y="149" fill="#065f46" font-size="15" font-weight="600">agent-alpha</text>
  <rect x="30" y="188" width="150" height="48" rx="10" fill="#eff6ff" stroke="#60a5fa"/>
  <circle cx="54" cy="212" r="8" fill="#3b82f6"/><text x="72" y="217" fill="#1e40af" font-size="15" font-weight="600">agent-beta</text>

  <!-- gateway -->
  <rect x="300" y="90" width="300" height="230" rx="14" fill="#ffffff" stroke="#14b8a6" stroke-width="2.5"/>
  <rect x="300" y="90" width="300" height="44" rx="14" fill="#14b8a6"/>
  <rect x="300" y="112" width="300" height="22" fill="#14b8a6"/>
  <text x="450" y="119" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">Tyk Gateway  ·  :8080  (OSS)</text>
  <g fill="#0f172a" font-size="15">
    <text x="326" y="172">✓  per-agent keys &amp; auth</text>
    <text x="326" y="204">✓  rate limits &amp; quotas</text>
    <text x="326" y="236">✓  per-tool access  <tspan fill="#0d9488" font-weight="600">(Go plugin)</tspan></text>
    <text x="326" y="268">✓  token budget  <tspan fill="#0d9488" font-weight="600">(Go plugin)</tspan></text>
  </g>
  <text x="326" y="300" fill="#64748b" font-size="13">key injected → agents never see the LLM key</text>

  <!-- upstreams -->
  <rect x="720" y="120" width="170" height="48" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="805" y="141" fill="#0f172a" font-size="14" font-weight="600" text-anchor="middle">MCP server</text>
  <text x="805" y="158" fill="#64748b" font-size="12" text-anchor="middle">FastMCP · Streamable HTTP</text>
  <rect x="720" y="188" width="170" height="48" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="805" y="209" fill="#0f172a" font-size="14" font-weight="600" text-anchor="middle">OpenAI API</text>
  <text x="805" y="226" fill="#64748b" font-size="12" text-anchor="middle">api.openai.com</text>

  <!-- arrows agents<->gateway -->
  <line x1="180" y1="144" x2="298" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <line x1="180" y1="212" x2="298" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <!-- arrows gateway<->upstreams -->
  <line x1="602" y1="150" x2="718" y2="144" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <line x1="602" y1="200" x2="718" y2="212" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- audit trail -->
  <line x1="450" y1="320" x2="450" y2="360" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#a)"/>
  <text x="462" y="348" fill="#94a3b8" font-size="12">analytics</text>
  <g font-size="13.5" text-anchor="middle">
    <rect x="250" y="378" width="120" height="42" rx="9" fill="#fff7ed" stroke="#fdba74"/><text x="310" y="404" fill="#9a3412" font-weight="600">Redis</text>
    <rect x="400" y="378" width="120" height="42" rx="9" fill="#fff7ed" stroke="#fdba74"/><text x="460" y="404" fill="#9a3412" font-weight="600">Tyk Pump</text>
    <rect x="550" y="378" width="150" height="42" rx="9" fill="#eef2ff" stroke="#a5b4fc"/><text x="625" y="399" fill="#3730a3" font-weight="600">Postgres</text><text x="625" y="414" fill="#6366f1" font-size="11">audit trail</text>
  </g>
  <line x1="370" y1="399" x2="398" y2="399" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
  <line x1="520" y1="399" x2="548" y2="399" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>
</svg>
